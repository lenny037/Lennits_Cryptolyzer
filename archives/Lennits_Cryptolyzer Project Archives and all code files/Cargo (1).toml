[package]
name = "genesis_brain"
version = "0.1.0"
edition = "2021"

[lib]
# This line is critical: it tells Rust to compile for JNI (Android NDK)
crate-type = ["cdylib"]

[dependencies]
jni = "0.21.1"
libp2p = { version = "0.53", features = ["tcp", "noise", "yamux"] }
tokio = { version = "1", features = ["full"] }
