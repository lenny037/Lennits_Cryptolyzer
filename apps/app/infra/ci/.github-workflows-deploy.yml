# MODULE 20: GitHub Actions CI/CD pipeline
name: LENNITS_CRYPTOLYZER Deploy

on:
  push:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r backend/requirements.txt
      - run: cd backend && pytest tests/ -v

  build-android:
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: "17", distribution: "temurin" }
      - uses: android-actions/setup-android@v3
      - name: Install Rust aarch64
        run: rustup target add aarch64-linux-android
      - name: Build Rust JNI
        run: cd rust-core && cargo build --release --target aarch64-linux-android
      - name: Build Android APK
        run: cd android && ./gradlew assembleRelease

  deploy-backend:
    runs-on: ubuntu-latest
    needs: test-backend
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to VPS
        run: |
          echo "${{ secrets.VPS_SSH_KEY }}" > key.pem
          chmod 600 key.pem
          ssh -i key.pem -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}             "cd /opt/lennit && git pull && docker-compose -f infra/docker/docker-compose.yml up -d --build"
